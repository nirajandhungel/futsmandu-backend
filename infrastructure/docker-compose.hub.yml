      STORAGE_PROVIDER:           ${STORAGE_PROVIDER:-s3}
      S3_ENDPOINT:                ${S3_ENDPOINT}
      S3_REGION:                  ${S3_REGION:-auto}
      S3_ACCESS_KEY:              ${S3_ACCESS_KEY}
      S3_SECRET_KEY:              ${S3_SECRET_KEY}
      S3_BUCKET:                  ${S3_BUCKET}
      S3_FORCE_PATH_STYLE:        ${S3_FORCE_PATH_STYLE:-false}
      S3_CDN_BASE_URL:            ${S3_CDN_BASE_URL:-}
      USE_SIGNED_IMAGE_URLS:      ${USE_SIGNED_IMAGE_URLS:-false}
      RESEND_API_KEY:             ${RESEND_API_KEY:-}
      SENTRY_DSN:                 ${SENTRY_DSN:-}
      APP_URL:                    ${APP_URL:-http://localhost}
      DB_POOL_SIZE:               ${ADMIN_DB_POOL_SIZE:-3}
      OTP_EXPIRY_MINUTES:         ${OTP_EXPIRY_MINUTES:-10}
      OTP_MAX_ATTEMPTS:           ${OTP_MAX_ATTEMPTS:-5}
      OTP_LENGTH:                 ${OTP_LENGTH:-6}
      ADMIN_API_PORT:             ${ADMIN_API_PORT:-3003}
    ports:
      - "3003:3003"   # direct access: http://localhost:3003/api/v1/admin/...
    networks:
