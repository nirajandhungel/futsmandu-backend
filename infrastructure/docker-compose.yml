# infrastructure/docker-compose.yml
# Futsmandu Backend — Three API Servers + Three Worker Processes + Nginx
#
# Services (ports):
#   nginx           :80/:443 → reverse proxy
#   player-api      :3001    → players (Next.js web + React Native)
#   owner-api       :3002    → venue owners (Flutter mobile)
#   admin-api       :3003    → admin dashboard (IP-restricted)
#   player-worker            → BullMQ: notifications/refunds/slot-expiry/stats/emails/sms
#   owner-worker             → BullMQ: FCM push/image-processing/emails/sms
#   admin-worker             → BullMQ: emails/admin-alerts
#
# Prerequisites:
#   Copy .env.example → .env and fill all values before running.
#   Run from repo root: pnpm docker:build && pnpm docker:up

networks:
  futsmandu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Shared environment blocks (YAML anchors) ──────────────────────────────────

x-common-env: &common-env
  NODE_ENV:                    ${NODE_ENV:-production}
  DATABASE_URL:                ${DATABASE_URL:?DATABASE_URL is required}
  DIRECT_DATABASE_URL:         ${DIRECT_DATABASE_URL:?DIRECT_DATABASE_URL is required}
  # BullMQ workers use ioredis (TLS) — must be rediss:// for Upstash
  UPSTASH_REDIS_IOREDIS_URL:   ${UPSTASH_REDIS_IOREDIS_URL:?UPSTASH_REDIS_IOREDIS_URL is required}
  # REST-based Redis client (caching, OTP store)
  UPSTASH_REDIS_REST_URL:      ${UPSTASH_REDIS_REST_URL:?UPSTASH_REDIS_REST_URL is required}
  UPSTASH_REDIS_REST_TOKEN:    ${UPSTASH_REDIS_REST_TOKEN:?UPSTASH_REDIS_REST_TOKEN is required}
  SENTRY_DSN:                  ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT:          ${SENTRY_ENVIRONMENT:-production}
  SENTRY_RELEASE:              ${SENTRY_RELEASE:-1.0.0}
  SENTRY_TRACES_SAMPLE_RATE:   ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  APP_URL:                     ${APP_URL:?APP_URL is required}
  DB_POOL_SIZE:                ${DB_POOL_SIZE:-5}
  # OTP settings — defaults match .env.example
  OTP_EXPIRY_MINUTES:          ${OTP_EXPIRY_MINUTES:-10}
  OTP_MAX_ATTEMPTS:            ${OTP_MAX_ATTEMPTS:-5}
  OTP_LENGTH:                  ${OTP_LENGTH:-6}

x-storage-env: &storage-env
  STORAGE_PROVIDER:            ${STORAGE_PROVIDER:-s3}
  S3_ENDPOINT:                 ${S3_ENDPOINT:?S3_ENDPOINT is required}
  S3_REGION:                   ${S3_REGION:-auto}
  S3_ACCESS_KEY:               ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
  S3_SECRET_KEY:               ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
  S3_BUCKET:                   ${S3_BUCKET:?S3_BUCKET is required}
  S3_FORCE_PATH_STYLE:         ${S3_FORCE_PATH_STYLE:-false}
  S3_CDN_BASE_URL:             ${S3_CDN_BASE_URL:-}
  USE_SIGNED_IMAGE_URLS:       ${USE_SIGNED_IMAGE_URLS:-false}

x-notification-env: &notification-env
  SPARROW_SMS_TOKEN:           ${SPARROW_SMS_TOKEN:-}
  FIREBASE_SERVICE_ACCOUNT:    ${FIREBASE_SERVICE_ACCOUNT:-}
  RESEND_API_KEY:              ${RESEND_API_KEY:-}

x-payment-env: &payment-env
  KHALTI_SECRET_KEY:           ${KHALTI_SECRET_KEY:-}
  ESEWA_SECRET_KEY:            ${ESEWA_SECRET_KEY:-}
  ESEWA_PRODUCT_CODE:          ${ESEWA_PRODUCT_CODE:-}
  ESEWA_MERCHANT_CODE:         ${ESEWA_MERCHANT_CODE:-}
  ESEWA_MERCHANT_SECRET:       ${ESEWA_MERCHANT_SECRET:-}

x-player-env: &player-env
  <<: [*common-env, *storage-env, *notification-env, *payment-env]
  PLAYER_JWT_SECRET: ${PLAYER_JWT_SECRET:?PLAYER_JWT_SECRET is required}

x-owner-env: &owner-env
  <<: [*common-env, *storage-env, *notification-env]
  OWNER_JWT_SECRET: ${OWNER_JWT_SECRET:?OWNER_JWT_SECRET is required}

x-admin-env: &admin-env
  <<: [*common-env, *storage-env]
  ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
  ADMIN_ALLOWED_IPS: ${ADMIN_ALLOWED_IPS:-127.0.0.1,172.20.0.0/16}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  
services:
  # ── NGINX ────────────────────────────────────────────────────────────────
  # Custom image — config is baked in so friends can pull without the repo.
  nginx:
    build:
      context: ..
      dockerfile: infrastructure/docker/nginx.Dockerfile
    container_name: futsmandu-nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      player-api:
        condition: service_healthy
      owner-api:
        condition: service_healthy
      admin-api:
        condition: service_healthy
    networks:
      - futsmandu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Player API ────────────────────────────────────────────────────────────
  # No container_name — enables --scale player-api=N
  player-api:
    build:
      context: ..
      dockerfile: infrastructure/docker/player.Dockerfile
      target: production
    environment:
      <<: *player-env
      PLAYER_API_PORT: ${PLAYER_API_PORT:-3001}
    networks:
      - futsmandu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/player/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:       { cpus: "1.0", memory: 512M }
        reservations: { cpus: "0.25", memory: 256M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # ── Player Worker ─────────────────────────────────────────────────────────
  player-worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/worker.Dockerfile
      target: production
    environment:
      <<: *player-env
      DB_POOL_SIZE: ${WORKER_DB_POOL_SIZE:-2}
    networks:
      - futsmandu-network
    restart: unless-stopped
    deploy:
      resources:
        limits:       { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Owner API ─────────────────────────────────────────────────────────────
  # Flutter mobile app. Higher memory for Sharp + multipart.
  owner-api:
    build:
      context: ..
      dockerfile: infrastructure/docker/owner-api.Dockerfile
      target: production
    container_name: futsmandu-owner-api
    environment:
      <<: *owner-env
      OWNER_API_PORT: ${OWNER_API_PORT:-3002}
      DB_POOL_SIZE:   ${OWNER_DB_POOL_SIZE:-5}
    networks:
      - futsmandu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/v1/owner/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:       { cpus: "0.75", memory: 768M }
        reservations: { cpus: "0.2", memory: 384M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  # ── Owner Worker ──────────────────────────────────────────────────────────
  # FCM push to Flutter devices + Sharp resize + emails + sms
  owner-worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/owner-worker.Dockerfile
      target: production
    environment:
      <<: *owner-env
      DB_POOL_SIZE: ${WORKER_DB_POOL_SIZE:-2}
    networks:
      - futsmandu-network
    restart: unless-stopped
    deploy:
      resources:
        limits:       { cpus: "0.75", memory: 512M }
        reservations: { cpus: "0.1", memory: 256M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Admin API ─────────────────────────────────────────────────────────────
  # Web dashboard only. IP-whitelisted. No multipart, no Sharp.
  admin-api:
    build:
      context: ..
      dockerfile: infrastructure/docker/admin-api.Dockerfile
      target: production
    container_name: futsmandu-admin-api
    environment:
      <<: *admin-env
      ADMIN_API_PORT: ${ADMIN_API_PORT:-3003}
      DB_POOL_SIZE:   ${ADMIN_DB_POOL_SIZE:-3}
    networks:
      - futsmandu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/v1/admin/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    deploy:
      resources:
        limits:       { cpus: "0.5", memory: 384M }
        reservations: { cpus: "0.1", memory: 192M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ── Admin Worker ──────────────────────────────────────────────────────────
  admin-worker:
    build:
      context: ..
      dockerfile: infrastructure/docker/admin-worker.Dockerfile
      target: production
    environment:
      <<: *admin-env
      DB_POOL_SIZE: ${WORKER_DB_POOL_SIZE:-2}
    networks:
      - futsmandu-network
    restart: unless-stopped
    deploy:
      resources:
        limits:       { cpus: "0.25", memory: 128M }
        reservations: { cpus: "0.05", memory: 64M }
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "2" }
