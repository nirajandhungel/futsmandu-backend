# infrastructure/nginx/sites-available/futsmandu-routes.conf
# Shared route definitions — included by both HTTP and HTTPS server blocks.
# Separated so HTTP→HTTPS redirect and HTTPS server don't duplicate route logic.

client_max_body_size 10m;

# Universal security headers
add_header X-Frame-Options        "DENY"          always;
add_header X-Content-Type-Options "nosniff"       always;
add_header X-XSS-Protection       "1; mode=block" always;
add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
add_header X-Request-Id           "$connection.$msec" always;

# ── NGINX internal health (no upstream — for load balancer probes) ─────────
location = /nginx-health {
  access_log off;
  return 200 '{"status":"ok","service":"nginx"}';
  add_header Content-Type application/json;
}

# ═══════════════════════════════════════════════════════════════════════════
# PLAYER API  — /api/v1/player/...
# ═══════════════════════════════════════════════════════════════════════════

# Auth: strict rate limit (brute-force protection)
location ~ ^/api/v1/player/auth/(login|register|forgot-password) {
  limit_req zone=auth burst=10 nodelay;
  limit_req_status 429;
  proxy_pass http://player_backend;
  include /etc/nginx/proxy_params;
}

# Booking hold: dedicated limit (anti-concurrent-hold spam)
location = /api/v1/player/bookings/hold {
  limit_req zone=booking burst=20 nodelay;
  limit_req_status 429;
  proxy_pass http://player_backend;
  include /etc/nginx/proxy_params;
}

# Payments: tight limit (prevent double-payment attempts)
location ~ ^/api/v1/player/payments {
  limit_req zone=payment burst=10 nodelay;
  limit_req_status 429;
  proxy_pass http://player_backend;
  include /etc/nginx/proxy_params;
}

# WebSocket — match group chat (Phase 2)
location /api/v1/player/matches/ws {
  proxy_pass         http://player_backend;
  proxy_http_version 1.1;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection "upgrade";
  proxy_set_header   Host       $host;
  proxy_read_timeout 86400s;
  proxy_send_timeout 86400s;
}

# All other player routes
location /api/v1/player {
  limit_req zone=general burst=100 nodelay;
  limit_req_status 429;
  proxy_pass http://player_backend;
  include /etc/nginx/proxy_params;
}

# ═══════════════════════════════════════════════════════════════════════════
# OWNER API  — /api/v1/owner/...
# Called by Flutter mobile app (no browser origin header enforcement needed)
# ═══════════════════════════════════════════════════════════════════════════

# Owner auth
location ~ ^/api/v1/owner/auth/(login|register) {
  limit_req zone=auth burst=10 nodelay;
  limit_req_status 429;
  proxy_pass http://owner_backend;
  include /etc/nginx/proxy_params;
}

# Owner image upload routes — larger body + extended timeout
location ~ ^/api/v1/owner/media {
  limit_req zone=owner burst=20 nodelay;
  limit_req_status 429;
  client_max_body_size 10m;         # presigned URL response (not the image itself)
  proxy_pass http://owner_backend;
  include /etc/nginx/proxy_params;
}

# All other owner routes
location /api/v1/owner {
  limit_req zone=owner burst=60 nodelay;
  limit_req_status 429;
  proxy_pass http://owner_backend;
  include /etc/nginx/proxy_params;
}

# ═══════════════════════════════════════════════════════════════════════════
# ADMIN API  — /api/v1/admin/...
# Web dashboard only. Dual IP restriction: Nginx + application middleware.
# ADMIN_ALLOWED_IPS in .env must match the IP block below.
# ═══════════════════════════════════════════════════════════════════════════

location /api/v1/admin/health {
  # Health check: public so Docker healthcheck can reach it from inside the network
  proxy_pass http://admin_backend;
  include /etc/nginx/proxy_params;
  access_log off;
}

location /api/v1/admin {
  # ── IP Whitelist at Nginx layer (first line of defence) ──────────────────
  # Docker internal addresses are always allowed (healthchecks, inter-service).
  allow 127.0.0.1;
  allow 172.20.0.0/16;      # futsmandu-network subnet (docker-compose.yml)

  # Add your office/VPN IPs below before going to production.
  # Example:
  #   allow 203.0.113.10/32;   # Office static IP
  #   allow 198.51.100.5/32;   # VPN exit node
  deny all;                    # Block everyone else — this line is always active

  limit_req zone=admin burst=30 nodelay;
  limit_req_status 429;
  proxy_pass http://admin_backend;
  include /etc/nginx/proxy_params;
}

# Swagger docs — dev only (blocked in production via NestJS IS_PROD check)
location /api/docs {
  proxy_pass http://player_backend;
  include /etc/nginx/proxy_params;
}

# ── Catch-all 404 ────────────────────────────────────────────────────────────
location / {
  return 404 '{"error":"Not found","code":"ROUTE_NOT_FOUND"}';
  add_header Content-Type application/json always;
}

# ── Rate limit error response ─────────────────────────────────────────────────
error_page 429 @rate_limited;
location @rate_limited {
  add_header Content-Type application/json always;
  return 429 '{"error":"Too many requests","code":"RATE_LIMIT_EXCEEDED","retryAfter":60}';
}
