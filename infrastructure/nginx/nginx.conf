# infrastructure/nginx/nginx.conf
# Futsmandu — Three independent API servers behind one Nginx reverse proxy.
#
# Upstreams:
#   player_backend  :3001  — public player API (scalable, least_conn)
#   owner_backend   :3002  — Flutter mobile owner API
#   admin_backend   :3003  — web dashboard (IP-whitelisted at nginx + app layer)
#
# Rate limit zones per endpoint criticality:
#   general  60r/s  — default for all API routes
#   auth      5r/s  — login/register (anti-brute-force)
#   booking  10r/s  — slot holds (anti-race-condition spam)
#   payment   5r/s  — payment initiation/verification
#   admin    20r/s  — admin dashboard (low volume, high trust)

worker_processes      auto;
worker_rlimit_nofile  65535;

events {
  worker_connections  4096;
  use                 epoll;
  multi_accept        on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Structured JSON access log — compatible with open-source nginx (no $request_id nginx-plus var)
  log_format json escape=json
    '{'
      '"ts":"$time_iso8601",'
      '"ip":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"rt":$request_time,'
      '"urt":"$upstream_response_time",'
      '"ua":"$http_user_agent",'
      '"rid":"$connection.$msec"'
    '}';

  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log  warn;

  sendfile       on;
  tcp_nopush     on;
  tcp_nodelay    on;
  keepalive_timeout 65;
  server_tokens  off;

  # Gzip for JSON API responses
  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_types
    application/json
    application/javascript
    text/plain
    text/css;

  # ── Rate limit zones ──────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:10m  rate=60r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/s;
  limit_req_zone $binary_remote_addr zone=booking:10m  rate=10r/s;
  limit_req_zone $binary_remote_addr zone=payment:10m  rate=5r/s;
  limit_req_zone $binary_remote_addr zone=owner:10m    rate=30r/s;
  limit_req_zone $binary_remote_addr zone=admin:10m    rate=20r/s;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  # least_conn on player_backend — distributes load evenly when scaled to 3+ replicas
  upstream player_backend {
    least_conn;
    server player-api:3001;
    keepalive 32;
  }

  # owner-api: single replica at MVP (container_name set → predictable DNS)
  upstream owner_backend {
    server owner-api:3002;
    keepalive 16;
  }

  # admin-api: single replica, low keepalive (few concurrent admins)
  upstream admin_backend {
    server admin-api:3003;
    keepalive 8;
  }

  # ── Main server (HTTP → redirect to HTTPS in production) ──────────────────
  server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # In production: redirect all HTTP to HTTPS
    # Uncomment after SSL is configured:
    # return 301 https://$host$request_uri;

    # Dev/staging: serve directly over HTTP
    include /etc/nginx/sites-available/futsmandu-routes.conf;
  }

  # ── HTTPS server (production) ─────────────────────────────────────────────
  # Uncomment after obtaining SSL certificates via Certbot / Let's Encrypt.
  #
  # server {
  #   listen      443 ssl http2;
  #   listen      [::]:443 ssl http2;
  #   server_name futsmandu.app www.futsmandu.app owner.futsmandu.app admin.futsmandu.app;
  #
  #   ssl_certificate     /etc/ssl/certs/futsmandu.crt;
  #   ssl_certificate_key /etc/ssl/private/futsmandu.key;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 1d;
  #   ssl_stapling        on;
  #   ssl_stapling_verify on;
  #
  #   include /etc/nginx/sites-available/futsmandu-routes.conf;
  # }
}
